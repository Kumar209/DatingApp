<div class="flex h-[calc(100vh-80px)] overflow-hidden">

  <aside
    class="border-r border-base-300 bg-base-100 transition-all duration-300"
    [class.w-72]="sidebarOpen()"
    [class.w-20]="!sidebarOpen()"
  >

    <div class="flex h-16 items-center justify-between border-b border-base-300 px-4">

      @if (sidebarOpen()) {
        <div>
          <h1 class="text-lg font-bold">
            Admin
          </h1>

          <p class="text-xs text-base-content/50">
            Management Panel
          </p>
        </div>
      }

      <button
        class="btn btn-ghost btn-sm"
        (click)="toggleSidebar()"
      >
        ☰
      </button>

    </div>

    <div class="p-3">

      <ul class="menu gap-2">

        <li>
          <a
            routerLink="/admin/users"
            routerLinkActive="bg-primary text-primary-content"
            class="rounded-xl"
          >

            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              class="h-5 w-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5V4H2v16h5m10 0v-2a4 4 0 00-4-4H11a4 4 0 00-4 4v2m10 0H7m8-10a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>

            @if (sidebarOpen()) {
              <span>User Management</span>
            }

          </a>
        </li>

        <li>
          <a
            routerLink="/admin/photos"
            routerLinkActive="bg-primary text-primary-content"
            class="rounded-xl"
          >

            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              class="h-5 w-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 16l4-4a3 3 0 014 0l5 5m-2-2l1-1a3 3 0 014 0l2 2M3 6a3 3 0 100 6 3 3 0 000-6z"
              />
            </svg>

            @if (sidebarOpen()) {
              <span>Photo Moderation</span>
            }

          </a>
        </li>

      </ul>

    </div>

  </aside>

  <main class="flex-1 overflow-auto p-4 md:p-6">
    <router-outlet />
  </main>

</div>
