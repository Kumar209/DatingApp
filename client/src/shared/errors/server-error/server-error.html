<div class="relative min-h-[calc(100vh-64px)] overflow-hidden bg-base-200">
  <!-- theme adaptive background -->
  <div
    class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,oklch(var(--p)/0.08)_0%,transparent_35%),radial-gradient(circle_at_bottom_right,oklch(var(--s)/0.06)_0%,transparent_35%)]"
  ></div>

  <div
    class="relative z-10 flex min-h-[calc(100vh-64px)] items-center justify-center px-4 py-8 sm:px-6 sm:py-10 lg:px-8 lg:py-12"
  >
    <div
      class="w-full max-w-2xl rounded-3xl border border-base-300 bg-base-100/85 p-6 shadow-2xl backdrop-blur-xl sm:p-8 lg:p-10"
    >
      <div class="flex flex-col items-center text-center">
        <!-- icon -->
        <div
          class="mb-5 flex h-20 w-20 items-center justify-center rounded-full bg-error/10 ring-8 ring-base-300/40 sm:h-24 sm:w-24"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.6"
            stroke="currentColor"
            class="h-10 w-10 text-error sm:h-12 sm:w-12"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v3.75m9.303 3.376c.866 1.5-.217 3.374-1.95 3.374H4.647c-1.733 0-2.816-1.874-1.95-3.374L10.05 3.374c.866-1.5 3.034-1.5 3.9 0l7.353 12.752ZM12 16.5h.008v.008H12V16.5Z"
            />
          </svg>
        </div>

        <!-- badge -->
        <div
          class="badge badge-outline border-base-300 mb-4 gap-2 px-4 py-3 text-[10px] font-semibold uppercase tracking-wide sm:text-[11px]"
        >
          500 • Server Error
        </div>

        <!-- heading -->
        <h1
          class="text-base-content text-3xl font-extrabold leading-tight sm:text-4xl lg:text-5xl"
        >
          Something went
          <span class="text-primary block">
            unexpectedly wrong
          </span>
        </h1>

        <!-- description -->
        <p
          class="text-base-content/65 mt-4 max-w-lg text-sm leading-relaxed sm:text-base"
        >
          {{ error?.message || 'An unexpected server error occurred while processing your request.' }}
        </p>

        <!-- actions -->
        <div
          class="mt-8 flex w-full flex-col gap-3 sm:w-auto sm:flex-row"
        >
          <button
            class="btn btn-outline h-11 rounded-xl px-6 text-sm font-semibold"
            (click)="goHome()"
          >
            Return Home
          </button>

          @if (error?.details) {
            <button
              class="btn btn-primary h-11 rounded-xl px-6 text-sm font-semibold shadow-lg"
              (click)="detailsToggle()"
            >
              {{ showDetails ? 'Hide Details' : 'View Details' }}
            </button>
          }
        </div>

        <!-- details -->
        @if (showDetails && error?.details) {
          <div
            class="mt-8 w-full rounded-2xl border border-base-300 bg-base-200 p-4 text-left shadow-inner"
          >
            <p class="mb-3 text-sm font-bold text-primary">
              Debug Details
            </p>

            <pre
              class="text-base-content/75 overflow-x-auto whitespace-pre-wrap break-words text-xs leading-relaxed"
            >{{ error.details }}</pre>
          </div>
        }
      </div>
    </div>
  </div>
</div>
