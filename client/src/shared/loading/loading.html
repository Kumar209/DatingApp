@if (busyService.isBusy()) {
  <div
    class="fixed inset-0 z-[9999] flex items-center justify-center bg-base-100/75 backdrop-blur-md"
  >
    <div
      class="flex flex-col items-center rounded-2xl border border-base-300 bg-base-100/95 px-6 py-5 shadow-xl"
    >
      <!-- Logo -->
      <div class="relative">
        <div
          class="absolute inset-0 animate-ping rounded-full bg-primary/15"
        ></div>

        <div
          class="relative flex h-14 w-14 items-center justify-center rounded-full border border-base-300 bg-base-100 shadow-md"
        >
          <img
            src="/logo.png"
            alt="Velentra"
            class="h-8 w-8 object-contain"
          />
        </div>
      </div>

      <!-- Brand -->
      <h2
        class="mt-4 text-lg font-bold uppercase tracking-[0.12em] text-base-content"
      >
        Velentra
      </h2>

      <!-- Message -->
      <p class="mt-1 text-xs text-base-content/60">
        Loading your experience...
      </p>

      <!-- Animated dots -->
      <div class="mt-3 flex gap-1.5">
        <span
          class="h-2 w-2 animate-bounce rounded-full bg-primary"
        ></span>

        <span
          class="h-2 w-2 animate-bounce rounded-full bg-primary [animation-delay:150ms]"
        ></span>

        <span
          class="h-2 w-2 animate-bounce rounded-full bg-primary [animation-delay:300ms]"
        ></span>
      </div>
    </div>
  </div>
}
