<div class="grid grid-cols-1 gap-6 lg:grid-cols-12">

  <!-- UPLOAD ZONE -->
  <div class="lg:col-span-7">
    <label
      for="dropzone-file"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.border-primary]="isDragging"
      [class.bg-primary/5]="isDragging"
      [class.scale-[1.01]]="isDragging"
      class="flex min-h-[320px] cursor-pointer flex-col items-center justify-center rounded-3xl border-2 border-dashed border-base-300 bg-base-200/30 p-8 text-center transition duration-300"
    >
      <!-- ICON -->
      <div
        class="mb-5 flex size-20 items-center justify-center rounded-full bg-primary/10 text-primary shadow-sm"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="size-10"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.7"
            d="M12 16.5V6.75m0 0-3.75 3.75M12 6.75l3.75 3.75M3.75 16.5v.75A2.25 2.25 0 0 0 6 19.5h12a2.25 2.25 0 0 0 2.25-2.25v-.75"
          />
        </svg>
      </div>

      <h3 class="text-2xl font-bold text-base-content">
        Drag & drop your photos
      </h3>

      <p class="mt-3 max-w-md text-base-content/60">
        Upload attractive, clear photos to increase your chances of meaningful connections.
      </p>

      <div class="mt-6">
        <span class="btn btn-primary rounded-2xl px-6 shadow-md">
          Choose Photos
        </span>
      </div>

      <p class="mt-4 text-xs uppercase tracking-[0.18em] text-base-content/40">
        JPG • PNG • WEBP
      </p>

      <input
        type="file"
        id="dropzone-file"
        class="hidden"
        accept="image/*"
        (change)="onFileSelected($event)"
      />
    </label>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="lg:col-span-5">
    @if (imageSrc()) {
      <div
        class="overflow-hidden rounded-3xl border border-base-300 bg-base-100 shadow-lg"
      >
        <!-- HEADER -->
        <div class="border-b border-base-300 px-5 py-5">
          <h3 class="text-xl font-bold text-base-content">
            Preview
          </h3>

          <p class="mt-1 text-sm text-base-content/60">
            Review your selected image before uploading.
          </p>
        </div>

        <!-- IMAGE -->
        <div class="p-5">
          <div
            class="flex min-h-[420px] items-center justify-center rounded-3xl border border-base-300 bg-base-200/30 p-4"
            >
            <img
                [src]="imageSrc()"
                alt="Preview image"
                class="max-h-[420px] max-w-full object-contain rounded-2xl"
            />
          </div>

          <!-- BUTTONS -->
          <div class="mt-5 grid grid-cols-1 gap-3 sm:grid-cols-2">
            <button
              (click)="onCancel()"
              class="btn btn-outline rounded-2xl"
            >
              Cancel
            </button>

            <button
              (click)="onUploadFile()"
              class="btn btn-primary rounded-2xl shadow-md"
              [disabled]="loading()"
            >
              @if (loading()) {
                <span class="loading loading-spinner loading-sm"></span>
                Uploading...
              } @else {
                Upload Photo
              }
            </button>
          </div>
        </div>
      </div>
    } @else {
      <!-- EMPTY PREVIEW -->
      <div
        class="flex min-h-[320px] flex-col items-center justify-center rounded-3xl border border-base-300 bg-base-200/20 p-8 text-center"
      >
        <div
          class="mb-4 flex size-16 items-center justify-center rounded-full bg-base-300/40"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="size-8 text-base-content/40"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.7"
              d="M3.375 19.5 9 13.875l4.125 4.125L20.625 10.5"
            />
          </svg>
        </div>

        <h3 class="text-lg font-semibold text-base-content">
          Preview will appear here
        </h3>

        <p class="mt-2 max-w-xs text-sm text-base-content/50">
          Select or drop an image to preview it before uploading.
        </p>
      </div>
    }
  </div>

</div>
